[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "ophirai"
version = "0.1.0"
description = "Python SDK for the Ophir Agent Negotiation Protocol"
readme = "README.md"
license = "MIT"
requires-python = ">=3.8"
authors = [
    { name = "Ophir Contributors" },
]
keywords = ["ophir", "ai", "inference", "negotiation", "agents"]
classifiers = [
    "Development Status :: 3 - Alpha",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: MIT License",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.8",
    "Programming Language :: Python :: 3.9",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Topic :: Scientific/Engineering :: Artificial Intelligence",
]
dependencies = [
    "httpx>=0.24.0",
]

[project.urls]
Homepage = "https://ophirai.com"
Repository = "https://github.com/ophirai/ophir"
Documentation = "https://docs.ophirai.com"
