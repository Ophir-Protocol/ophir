name: ophir-negotiate
display_name: "Ophir -- Agent-to-Agent Commerce and Negotiation"
description: |
  Enable autonomous agent-to-agent commerce through the Ophir protocol.
  Your AI agent can discover service providers, negotiate pricing and SLA
  terms, sign binding agreements, monitor compliance, and file disputes --
  all without human intervention.

  Ophir implements a full A2A (agent-to-agent) negotiation lifecycle:
  discover providers on the network, send RFQs (requests for quote),
  compare competing offers, accept the best deal, and continuously
  monitor SLA compliance with cryptographic enforcement.

  Tools provided:
  - ophir_discover: Search the Ophir network for service providers by category, reputation, or pricing
  - ophir_negotiate: Run a complete negotiation flow (discover, RFQ, quote collection, ranking)
  - ophir_accept_quote: Accept a provider quote to create a signed, enforceable agreement
  - ophir_check_agreement: Monitor active agreement SLA compliance in real time
  - ophir_list_agreements: View all active agreements with pricing and status
  - ophir_dispute: File a dispute for SLA violations with cryptographic evidence

  No API keys required. Connects to the public Ophir registry out of the box.
version: "0.2.0"
author: "Ophir Protocol"
license: "MIT"
repository: "https://github.com/ophirai/ophir"
homepage: "https://ophir.ai"
categories:
  - "ai"
  - "negotiation"
  - "infrastructure"
  - "cost-optimization"
  - "commerce"
tags:
  - "mcp"
  - "ai-agents"
  - "negotiation"
  - "commerce"
  - "protocol"
  - "ophir"
  - "a2a"
install:
  type: "npx"
  command: "npx @ophirai/mcp-server"
config:
  registry_url:
    type: "string"
    description: "Ophir registry URL"
    default: "https://registry.ophir.ai/v1"
    required: false
