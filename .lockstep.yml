version: "1"

config:
  agent: "claude-code"
  max_retries: 7
  step_timeout: 900
  working_directory: "."
  judge_mode: "subscription"

context: |
  We are building Ophir — the Agent Negotiation Protocol. An open standard for
  AI agent-to-agent commercial negotiation. The first protocol that lets one AI
  agent say "I need X capability at Y price with Z reliability" and another
  agent respond with a bid, negotiate terms, and commit cryptographically.

  PROJECT NAME: "Ophir" — use @ophir/ as npm scope. NOT @anp/.
  LOCATION: /home/cryptalis/Ophir/

  PROTOCOL OVERVIEW:
  - JSON-RPC 2.0 over HTTPS (consistent with A2A and MCP)
  - 6 RPC methods: negotiate/rfq, negotiate/quote, negotiate/counter,
    negotiate/accept, negotiate/reject, negotiate/dispute
  - Ed25519 signing with JCS (RFC 8785) canonicalization
  - did:key agent identity (W3C DID standard, compatible with Solana keypairs)
  - Solana escrow (Anchor program) for USDC payments
  - Integrates with A2A Agent Cards, MCP, x402, Lockstep verification

  MONOREPO (Turborepo + npm workspaces):
    packages/
      protocol/          @ophir/protocol — Message types, JSON Schemas, SLA schema
      sdk/               @ophir/sdk — BuyerAgent, SellerAgent, signing, transport, escrow
      escrow/            Anchor program for Solana escrow (Rust)
      reference-agents/  @ophir/reference-agents — 5 mock seller agents
      demo/              @ophir/demo — Killer demo script
      mcp-server/        @ophir/mcp-server — MCP tool wrapper
      docs/              Documentation site

  NEGOTIATION STATE MACHINE:
    IDLE → RFQ_SENT → QUOTES_RECEIVED → COUNTERING → ACCEPTED → ESCROWED → ACTIVE → COMPLETED
                                                      ↘ REJECTED
                                        ACTIVE → DISPUTED → RESOLVED

  SLA METRICS: uptime_pct, p50_latency_ms, p99_latency_ms, accuracy_pct,
    throughput_rpm, error_rate_pct, time_to_first_byte_ms, custom

  DEFAULTS:
    Solana RPC: https://api.devnet.solana.com
    RFQ timeout: 5min, Quote timeout: 2min, Counter timeout: 2min
    Max negotiation rounds: 5, Currency: USDC
    Escrow PDA seeds: ["escrow", buyer_pubkey, agreement_hash]

  CRITICAL REQUIREMENTS:
  - Never use CommonJS — all packages use ESM ("type": "module")
  - Use vitest for testing
  - Use Zod for runtime validation
  - Use tweetnacl for Ed25519 operations
  - Use json-stable-stringify for JCS canonicalization
  - Target developer experience: 15 lines buyer, 15 lines seller
  - All TypeScript strict mode
  - EVERY public function must have JSDoc comments
  - EVERY module must have comprehensive tests — no stubs, no "TODO" tests
  - Crypto operations MUST be correct — verify signatures before trusting data
  - All error paths MUST be tested (invalid signatures, expired messages, bad state transitions)

  QUALITY BAR:
  This codebase must be production-grade. Every function tested. Every crypto
  operation verified. Every error path handled. The AI judge threshold is 9/10.
  Write code as if it will be audited by security researchers.

steps:
  # ==========================================================================
  # STEP 1: Monorepo Scaffolding
  # ==========================================================================
  - name: "Monorepo Scaffolding"
    prompt: |
      Initialize the Ophir monorepo with Turborepo and npm workspaces.

      The project already has files from a previous build. Review what exists,
      fix any issues, and ensure the scaffolding is clean and correct.

      1. ROOT package.json:
         - name: "ophir"
         - private: true
         - workspaces: ["packages/*"]
         - scripts:
             build: "turbo run build"
             test: "turbo run test"
             lint: "turbo run lint"
             clean: "turbo run clean"
         - devDependencies:
             turbo: "^2.0.0"
             typescript: "^5.5.0"

      2. turbo.json:
         {
           "$schema": "https://turbo.build/schema.json",
           "tasks": {
             "build": { "dependsOn": ["^build"], "outputs": ["dist/**"] },
             "test": { "dependsOn": ["build"] },
             "lint": {},
             "clean": { "cache": false }
           }
         }

      3. Root tsconfig.json (base config):
         - target: "ES2022"
         - module: "NodeNext"
         - moduleResolution: "NodeNext"
         - strict: true
         - declaration: true
         - esModuleInterop: true
         - skipLibCheck: true
         - forceConsistentCasingInFileNames: true
         - resolveJsonModule: true

      4. Create ALL package directories with their own package.json and tsconfig.json:

         packages/protocol/
           package.json: name "@ophir/protocol", version "0.1.0", type "module"
           main: "dist/index.js", types: "dist/index.d.ts"
           scripts: build (tsc), test (vitest run), lint (tsc --noEmit), clean (rm -rf dist)
           dependencies: zod ^3.23.0
           devDependencies: typescript ^5.5.0, vitest ^2.0.0

         packages/sdk/
           package.json: name "@ophir/sdk", version "0.1.0", type "module"
           dependencies: @ophir/protocol (workspace:*), @solana/web3.js ^1.95.0,
             tweetnacl ^1.0.3, json-stable-stringify ^1.1.0, zod ^3.23.0,
             express ^4.18.0, uuid ^9.0.0
           devDependencies: typescript ^5.5.0, vitest ^2.0.0, @types/express ^4.17.0,
             @types/json-stable-stringify ^1.0.0, @types/uuid ^10.0.0, tsx ^4.0.0

         packages/escrow/
           (Anchor program — directory with Anchor.toml and Rust source)

         packages/reference-agents/
           package.json: name "@ophir/reference-agents", version "0.1.0", type "module"
           bin: { "ophir-agents": "dist/cli.js" }
           dependencies: @ophir/sdk (workspace:*), @ophir/protocol (workspace:*),
             commander ^12.0.0, express ^4.18.0
           devDependencies: typescript ^5.5.0, vitest ^2.0.0, @types/express ^4.17.0, tsx ^4.0.0

         packages/demo/
           package.json: name "@ophir/demo", version "0.1.0", type "module"
           bin: { "ophir-demo": "dist/index.js" }
           dependencies: @ophir/sdk (workspace:*), @ophir/protocol (workspace:*),
             @ophir/reference-agents (workspace:*), chalk ^5.3.0
           devDependencies: typescript ^5.5.0, tsx ^4.0.0

         packages/mcp-server/
           package.json: name "@ophir/mcp-server", version "0.1.0", type "module"
           dependencies: @ophir/sdk (workspace:*), @ophir/protocol (workspace:*)
           devDependencies: typescript ^5.5.0, vitest ^2.0.0

         packages/docs/
           Documentation directory

      5. Each package's tsconfig.json should extend the root:
         { "extends": "../../tsconfig.json", "compilerOptions": { "outDir": "dist", "rootDir": "src" }, "include": ["src"] }

      6. Create src/index.ts in each package (empty export or placeholder).

      7. Create .gitignore at root:
         node_modules/ dist/ .turbo/ target/ *.so .DS_Store .env .lockstep/

      8. Create LICENSE file (MIT, copyright 2026 Ophir Contributors).

      9. Run npm install at the root to link workspaces.

      10. Verify: npx tsc --noEmit should pass.
    validate:
      - type: file_exists
        target: "package.json"
        label: "Root package.json exists"
      - type: file_exists
        target: "turbo.json"
        label: "Turborepo config exists"
      - type: file_exists
        target: "tsconfig.json"
        label: "Root tsconfig exists"
      - type: file_exists
        target: ".gitignore"
        label: "Gitignore exists"
      - type: file_exists
        target: "LICENSE"
        label: "MIT license exists"
      - type: file_exists
        target: "packages/protocol/package.json"
        label: "Protocol package exists"
      - type: file_exists
        target: "packages/sdk/package.json"
        label: "SDK package exists"
      - type: file_exists
        target: "packages/reference-agents/package.json"
        label: "Reference agents package exists"
      - type: file_exists
        target: "packages/demo/package.json"
        label: "Demo package exists"
      - type: file_exists
        target: "packages/mcp-server/package.json"
        label: "MCP server package exists"
      - type: file_contains
        path: "package.json"
        pattern: "workspaces"
        label: "Root uses workspaces"
      - type: command_passes
        command: "test -d node_modules"
        label: "npm install completed"
        timeout: 120

  # ==========================================================================
  # STEP 2: Protocol Package — Types & Schemas
  # ==========================================================================
  - name: "Protocol Package — Types and Schemas"
    prompt: |
      Build the @ophir/protocol package with all message types, schemas, and constants.
      This package has ZERO runtime dependencies except Zod. It is the shared type
      foundation for the entire protocol.

      Review existing files and fix/improve them. Create anything missing.

      Create these files in packages/protocol/src/:

      1. types.ts — All TypeScript interfaces. EVERY interface must have JSDoc comments
         explaining what it is and when it's used:

         AgentIdentity { agent_id: string (did:key:...), endpoint: string, reputation_score?: number, completed_jobs?: number }

         ServiceRequirement { category: string, description?: string, requirements?: Record<string, any> }

         BudgetConstraint { max_price_per_unit: string, currency: string, unit: string, total_budget?: string }

         PaymentMethod { network: string, token: string }

         PricingOffer { price_per_unit: string, currency: string, unit: string, pricing_model: 'fixed' | 'dynamic' | 'auction', minimum_commitment?: string, volume_discounts?: VolumeDiscount[] }

         VolumeDiscount { min_units: number, price_per_unit: string }

         SLAMetric { name: 'uptime_pct' | 'p50_latency_ms' | 'p99_latency_ms' | 'accuracy_pct' | 'throughput_rpm' | 'error_rate_pct' | 'time_to_first_byte_ms' | 'custom', target: number, comparison: 'gte' | 'lte' | 'eq' | 'between', measurement_method?: 'rolling_average' | 'percentile' | 'absolute' | 'sampled', measurement_window?: string, penalty_per_violation?: { amount: string, currency: string, max_penalties_per_window?: number }, custom_name?: string }

         SLARequirement { metrics: SLAMetric[], dispute_resolution?: { method: 'automatic_escrow' | 'lockstep_verification' | 'timeout_release' | 'manual_arbitration', timeout_hours?: number, arbitrator?: string } }

         ExecutionInfo { estimated_start?: string, estimated_duration?: string, capacity?: string }

         EscrowRequirement { type: 'solana_pda', deposit_amount: string, release_condition: string }

         LockstepSpec { enabled: boolean, verification_endpoint?: string, spec_hash?: string }

         RFQParams { rfq_id: string, buyer: AgentIdentity, service: ServiceRequirement, budget: BudgetConstraint, sla_requirements?: SLARequirement, negotiation_style: 'rfq' | 'auction' | 'fixed-price', max_rounds?: number, expires_at: string, accepted_payments?: PaymentMethod[] }

         QuoteParams { quote_id: string, rfq_id: string, seller: AgentIdentity, pricing: PricingOffer, sla_offered?: SLARequirement, execution?: ExecutionInfo, escrow_requirement?: EscrowRequirement, expires_at: string, signature: string }

         CounterParams { counter_id: string, rfq_id: string, in_response_to: string, round: number, from: { agent_id: string, role: 'buyer' | 'seller' }, modifications: Record<string, any>, justification?: string, expires_at: string, signature: string }

         FinalTerms { price_per_unit: string, currency: string, unit: string, sla?: SLARequirement, escrow?: { network: string, deposit_amount: string, release_condition: string } }

         AcceptParams { agreement_id: string, rfq_id: string, accepting_message_id: string, final_terms: FinalTerms, agreement_hash: string, buyer_signature: string, seller_signature: string, lockstep_spec?: LockstepSpec }

         RejectParams { rfq_id: string, rejecting_message_id: string, reason: string, from: { agent_id: string } }

         ViolationEvidence { sla_metric: string, agreed_value: number, observed_value: number, measurement_window: string, evidence_hash: string, evidence_url?: string }

         DisputeParams { dispute_id: string, agreement_id: string, filed_by: { agent_id: string, role: 'buyer' | 'seller' }, violation: ViolationEvidence, requested_remedy: string, escrow_action: string, lockstep_report?: { verification_id: string, result: 'PASS' | 'FAIL', deviations: string[] }, signature: string }

         NegotiationState = 'IDLE' | 'RFQ_SENT' | 'QUOTES_RECEIVED' | 'COUNTERING' | 'ACCEPTED' | 'ESCROWED' | 'ACTIVE' | 'COMPLETED' | 'REJECTED' | 'DISPUTED' | 'RESOLVED'

         JSON-RPC envelope types:
         JsonRpcRequest<T> { jsonrpc: '2.0', method: string, id: string, params: T }
         JsonRpcResponse<T> { jsonrpc: '2.0', id: string, result?: T, error?: { code: number, message: string, data?: any } }

      2. schemas.ts — Zod schemas for runtime validation of ALL params types.
         Create a Zod schema for each *Params type. These must be thorough:
         - Validate UUID format for IDs
         - Validate ISO 8601 for dates
         - Validate did:key format for agent_id
         - Validate numeric strings for prices (must be parseable as numbers)
         - Validate enum values exhaustively
         Export them all.

      3. sla-schema.ts — The JSON Schema (as a JS object) for the SLA specification.

      4. errors.ts — Error codes enum and OphirError class:
         enum OphirErrorCode with all codes (OPHIR_001 through OPHIR_402).
         class OphirError extends Error with code, data, and proper stack traces.

      5. constants.ts — DEFAULT_CONFIG with all defaults.

      6. methods.ts — Protocol method constants.

      7. index.ts — Barrel export everything.

      8. __tests__/schemas.test.ts — COMPREHENSIVE schema tests:
         - Test every Zod schema with valid data → passes
         - Test every Zod schema with invalid data → fails with correct error
         - Test RFQParams rejects invalid UUID
         - Test RFQParams rejects expired dates
         - Test QuoteParams requires valid signature format
         - Test SLA metrics validate enum values
         - Test edge cases: empty strings, negative numbers, missing required fields
         At least 30 test cases.

      Run: cd packages/protocol && npx vitest run --reporter=verbose
    validate:
      - type: file_exists
        target: "packages/protocol/src/types.ts"
        label: "Protocol types file exists"
      - type: file_exists
        target: "packages/protocol/src/schemas.ts"
        label: "Zod schemas file exists"
      - type: file_exists
        target: "packages/protocol/src/errors.ts"
        label: "Error codes file exists"
      - type: file_exists
        target: "packages/protocol/src/constants.ts"
        label: "Constants file exists"
      - type: file_exists
        target: "packages/protocol/src/__tests__/schemas.test.ts"
        label: "Schema tests exist"
      - type: file_contains
        path: "packages/protocol/src/types.ts"
        pattern: "NegotiationState"
        label: "State machine type defined"
      - type: file_contains
        path: "packages/protocol/src/types.ts"
        pattern: "RFQParams"
        label: "RFQ params type defined"
      - type: file_contains
        path: "packages/protocol/src/types.ts"
        pattern: "DisputeParams"
        label: "Dispute params type defined"
      - type: file_contains
        path: "packages/protocol/src/errors.ts"
        pattern: "OphirErrorCode"
        label: "Error codes enum defined"
      - type: file_contains
        path: "packages/protocol/src/types.ts"
        pattern: "JSDoc"
        is_regex: false
        label: "Types have JSDoc comments"
      - type: command_passes
        command: "cd packages/protocol && npx tsc --noEmit"
        label: "Protocol package compiles"
        timeout: 60
      - type: command_passes
        command: "cd packages/protocol && npx vitest run --reporter=verbose 2>&1 | tail -5"
        label: "Protocol schema tests pass"
        timeout: 120

  # ==========================================================================
  # STEP 3: SDK — Signing, Identity, Canonicalization
  # ==========================================================================
  - name: "SDK — Signing, Identity, Canonicalization"
    prompt: |
      Build the cryptographic foundation in packages/sdk/src/. This is the MOST
      CRITICAL module — get crypto wrong and nothing works. Every function must be
      tested exhaustively including adversarial cases.

      Review existing files, fix any issues, ensure correctness.

      1. signing.ts — Ed25519 signing and verification:
         - Uses tweetnacl (import nacl from 'tweetnacl')
         - EVERY function must have JSDoc comments

         canonicalize(obj: any): string
           JCS (RFC 8785) canonicalization using json-stable-stringify.
           MUST produce deterministic output regardless of key insertion order.
           MUST handle nested objects, arrays, nulls, numbers, booleans.
           MUST NOT include undefined values.

         sign(canonicalBytes: Uint8Array, secretKey: Uint8Array): string
           Ed25519 signature, returned as base64 string.
           Validate secretKey is 64 bytes (nacl.sign.secretKeyLength).
           Throw OphirError(INVALID_SIGNATURE) if key is wrong length.

         verify(canonicalBytes: Uint8Array, signature: string, publicKey: Uint8Array): boolean
           Decode base64 signature, verify with tweetnacl.
           Return false (never throw) on invalid signature.
           Validate publicKey is 32 bytes.

         agreementHash(finalTerms: FinalTerms): string
           SHA-256 of canonicalized final terms as hex string.
           Use Node.js crypto.createHash('sha256').

         signMessage(params: any, secretKey: Uint8Array): string
           Canonicalize → encode to UTF-8 → sign → return base64.

         verifyMessage(params: any, signature: string, publicKey: Uint8Array): boolean
           Canonicalize → encode to UTF-8 → verify.

      2. identity.ts — DID:key generation and resolution:
         MUST follow the did:key specification exactly.

         generateKeyPair(): { publicKey: Uint8Array, secretKey: Uint8Array }
           Uses nacl.sign.keyPair(). Returns raw key bytes.

         publicKeyToDid(publicKey: Uint8Array): string
           Ed25519 multicodec prefix: 0xed, 0x01 (two bytes)
           Prepend to public key → base58btc encode → prefix with 'z' → did:key:z...
           Use bs58 for base58 encoding.

         didToPublicKey(did: string): Uint8Array
           Parse did:key:z... → remove 'z' prefix → base58btc decode →
           strip first 2 bytes (multicodec prefix) → return 32-byte public key.
           Throw OphirError if DID format is invalid.
           Validate the multicodec prefix is 0xed01.

         generateAgentIdentity(endpoint: string): { agentId: string, keypair: { publicKey, secretKey }, endpoint: string }

      3. packages/sdk/src/types.ts — SDK-specific types with JSDoc:
         EscrowConfig, ServiceOffering, PricingStrategy, RankingFunction,
         SellerInfo, Agreement, DisputeResult, JobResult

      4. __tests__/signing.test.ts — EXHAUSTIVE crypto tests (at least 25 tests):
         - canonicalize: deterministic output regardless of key order
         - canonicalize: handles nested objects
         - canonicalize: handles arrays
         - canonicalize: handles null values
         - canonicalize: excludes undefined values
         - canonicalize: identical output for equivalent objects
         - sign/verify: roundtrip with valid keypair
         - sign/verify: fails with wrong public key
         - sign/verify: fails with tampered data (flip one byte)
         - sign/verify: fails with truncated signature
         - sign/verify: fails with empty signature
         - sign: throws on invalid secret key length
         - verify: returns false for garbage signature
         - agreementHash: deterministic for same input
         - agreementHash: different for different input
         - agreementHash: output is valid hex string of length 64
         - signMessage/verifyMessage: roundtrip
         - signMessage/verifyMessage: fails with modified params
         - DID generation roundtrip (publicKeyToDid → didToPublicKey)
         - DID starts with "did:key:z6Mk"
         - didToPublicKey rejects invalid DID format
         - didToPublicKey rejects wrong multicodec prefix
         - generateKeyPair returns 32-byte public key and 64-byte secret key
         - Two generateKeyPair calls produce different keys
         - Cross-verification: sign with one keypair, verify fails with another

      Run: cd packages/sdk && npx vitest run --reporter=verbose
    validate:
      - type: file_exists
        target: "packages/sdk/src/signing.ts"
        label: "Signing module exists"
      - type: file_exists
        target: "packages/sdk/src/identity.ts"
        label: "Identity module exists"
      - type: file_exists
        target: "packages/sdk/src/__tests__/signing.test.ts"
        label: "Signing tests exist"
      - type: file_contains
        path: "packages/sdk/src/signing.ts"
        pattern: "canonicalize"
        label: "Canonicalize function exists"
      - type: file_contains
        path: "packages/sdk/src/identity.ts"
        pattern: "did:key"
        label: "DID:key support exists"
      - type: file_contains
        path: "packages/sdk/src/signing.ts"
        pattern: "createHash"
        label: "SHA-256 hashing used"
      - type: file_contains
        path: "packages/sdk/src/identity.ts"
        pattern: "0xed"
        is_regex: false
        label: "Ed25519 multicodec prefix used"
      - type: command_passes
        command: "cd packages/sdk && npx vitest run src/__tests__/signing.test.ts --reporter=verbose 2>&1 | tail -30"
        label: "Signing tests pass"
        timeout: 120
      - type: command_passes
        command: "cd packages/sdk && npx vitest run src/__tests__/signing.test.ts 2>&1 | grep -oP '\\d+ passed' | head -1"
        label: "At least 20 signing tests"
        timeout: 120

  # ==========================================================================
  # STEP 4: SDK — Transport & Negotiation State Machine
  # ==========================================================================
  - name: "SDK — Transport and State Machine"
    prompt: |
      Build the transport layer and negotiation state machine in packages/sdk/src/.
      Review existing files, fix issues, ensure correctness.

      1. transport.ts — JSON-RPC 2.0 HTTP client with JSDoc:
         class JsonRpcClient:
           constructor(config?: { timeout?: number })
           async send<T>(endpoint: string, method: string, params: any, id?: string): Promise<T>
             POST with JSON-RPC 2.0 envelope. Uses native fetch().
             Throws OphirError(SELLER_UNREACHABLE) on network errors.
             Throws OphirError(INVALID_MESSAGE) on JSON-RPC error responses.
             Sets Content-Type: application/json, User-Agent: ophir-sdk/0.1.0.
           async sendNotification(endpoint: string, method: string, params: any): Promise<void>

      2. negotiation.ts — NegotiationSession state machine with JSDoc:
         EVERY state transition must be validated. Invalid transitions throw
         OphirError(INVALID_STATE_TRANSITION).

         class NegotiationSession:
           readonly rfqId: string
           state: NegotiationState
           readonly rfq: RFQParams
           quotes: QuoteParams[]
           counters: CounterParams[]
           agreement?: Agreement
           currentRound: number
           maxRounds: number
           createdAt: Date
           updatedAt: Date

           constructor(rfq: RFQParams, maxRounds?: number)

           addQuote(quote: QuoteParams): void
             Valid from: RFQ_SENT, QUOTES_RECEIVED → QUOTES_RECEIVED
           addCounter(counter: CounterParams): void
             Valid from: QUOTES_RECEIVED, COUNTERING → COUNTERING
             Check currentRound < maxRounds, throw MAX_ROUNDS_EXCEEDED if not
           accept(agreement: Agreement): void
             Valid from: QUOTES_RECEIVED, COUNTERING → ACCEPTED
           reject(reason: string): void
             Valid from: RFQ_SENT, QUOTES_RECEIVED, COUNTERING → REJECTED
           escrowFunded(escrowAddress: string): void
             Valid from: ACCEPTED → ESCROWED
           activate(): void
             Valid from: ESCROWED → ACTIVE
           complete(): void
             Valid from: ACTIVE → COMPLETED
           dispute(): void
             Valid from: ACTIVE → DISPUTED
           resolve(): void
             Valid from: DISPUTED → RESOLVED
           isExpired(): boolean
           toJSON(): object

      3. server.ts — JSON-RPC server (Express-based) with JSDoc:
         class NegotiationServer:
           handle(method: string, handler): void
           listen(port: number): Promise<void>
           close(): Promise<void>
           getPort(): number  // Return actual listening port (important for random ports)

      4. __tests__/negotiation.test.ts — EXHAUSTIVE state machine tests (at least 25):
         - Test initial state is RFQ_SENT
         - Test addQuote from RFQ_SENT → QUOTES_RECEIVED
         - Test addQuote from QUOTES_RECEIVED stays QUOTES_RECEIVED
         - Test addCounter from QUOTES_RECEIVED → COUNTERING
         - Test addCounter increments currentRound
         - Test addCounter throws MAX_ROUNDS_EXCEEDED when maxRounds hit
         - Test accept from QUOTES_RECEIVED → ACCEPTED
         - Test accept from COUNTERING → ACCEPTED
         - Test reject from RFQ_SENT → REJECTED
         - Test reject from QUOTES_RECEIVED → REJECTED
         - Test reject from COUNTERING → REJECTED
         - Test escrowFunded from ACCEPTED → ESCROWED
         - Test activate from ESCROWED → ACTIVE
         - Test complete from ACTIVE → COMPLETED
         - Test dispute from ACTIVE → DISPUTED
         - Test resolve from DISPUTED → RESOLVED
         - INVALID: addQuote from ACCEPTED throws
         - INVALID: accept from REJECTED throws
         - INVALID: escrowFunded from RFQ_SENT throws
         - INVALID: activate from ACCEPTED throws (must escrow first)
         - INVALID: complete from ESCROWED throws (must activate first)
         - INVALID: dispute from COMPLETED throws
         - Test toJSON serialization and content
         - Test multiple quotes accumulate
         - Test session preserves RFQ data

      Run: cd packages/sdk && npx vitest run --reporter=verbose
    validate:
      - type: file_exists
        target: "packages/sdk/src/transport.ts"
        label: "Transport module exists"
      - type: file_exists
        target: "packages/sdk/src/negotiation.ts"
        label: "Negotiation state machine exists"
      - type: file_exists
        target: "packages/sdk/src/server.ts"
        label: "Server module exists"
      - type: file_exists
        target: "packages/sdk/src/__tests__/negotiation.test.ts"
        label: "Negotiation tests exist"
      - type: file_contains
        path: "packages/sdk/src/negotiation.ts"
        pattern: "NegotiationSession"
        label: "NegotiationSession class exists"
      - type: file_contains
        path: "packages/sdk/src/negotiation.ts"
        pattern: "INVALID_STATE_TRANSITION"
        label: "Invalid transition handling exists"
      - type: file_contains
        path: "packages/sdk/src/negotiation.ts"
        pattern: "MAX_ROUNDS_EXCEEDED"
        label: "Max rounds enforcement exists"
