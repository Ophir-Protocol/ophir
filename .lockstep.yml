  # ==========================================================================
  # STEP 16: Fix Crypto — Add signatures to ALL message types
  # ==========================================================================
  - name: "Fix Crypto — Sign and Verify ALL Messages"
    retries: 7
    timeout: 900
    prompt: |
      CRITICAL SECURITY FIX: The protocol has a cryptographic gap — RFQ and Reject
      messages have NO signature fields. This means any agent can forge an RFQ
      claiming to be someone else, or reject negotiations without authorization.

      You MUST fix this across the entire stack:

      1. packages/protocol/src/types.ts:
         - Add "signature: string" field to RFQParams interface
         - Add "signature: string" field to RejectParams interface
         - Add JSDoc to EVERY interface explaining the field
         - Add JSDoc to EVERY field in EVERY interface (not just the interface itself)

      2. packages/protocol/src/schemas.ts:
         - Update RFQParamsSchema to require and validate signature (base64 Ed25519)
         - Update RejectParamsSchema to require and validate signature
         - Ensure ALL 6 message schemas validate signatures where present

      3. packages/sdk/src/messages.ts:
         - Update buildRFQ to accept secretKey parameter and SIGN the RFQ params
         - Update buildReject to accept secretKey parameter and SIGN the reject params
         - Verify ALL 6 builders sign their messages (RFQ, Quote, Counter, Accept, Reject, Dispute)

      4. packages/sdk/src/seller.ts:
         - In the RFQ handler: VERIFY the buyer's signature on incoming RFQs
           Extract buyer's public key from buyer.agent_id (DID), verify signature.
           Reject RFQs with invalid signatures by ignoring them.
         - Add JSDoc explaining the verification flow

      5. packages/sdk/src/buyer.ts:
         - Verify seller's signature on ALL incoming messages (quotes, counters, accepts)
         - Verify the buyer is signing ALL outgoing messages (RFQ, counter, accept, reject)
         - In acceptQuote: verify seller's quote signature BEFORE trusting pricing/SLA
         - Add JSDoc explaining the verification flow

      6. Update ALL calling code that uses buildRFQ and buildReject to pass secretKey.
         This includes: buyer.ts requestQuotes(), buyer.ts reject(), demo, reference agents.

      7. Fix compilation: cd packages/protocol && npx tsc --noEmit
         Fix compilation: cd packages/sdk && npx tsc --noEmit

      8. Fix tests: cd packages/sdk && npx vitest run
         Update any tests that construct RFQ/Reject messages to include signatures.

      The rule is simple: EVERY message in the protocol MUST be signed by its sender,
      and EVERY receiver MUST verify the signature before trusting the message.
    validate:
      - type: file_contains
        path: "packages/protocol/src/types.ts"
        pattern: "signature.*string"
        is_regex: true
        label: "RFQParams has signature field"
      - type: file_contains
        path: "packages/sdk/src/messages.ts"
        pattern: "signMessage"
        label: "All builders use signMessage"
      - type: file_contains
        path: "packages/sdk/src/seller.ts"
        pattern: "verifyMessage"
        label: "Seller verifies signatures"
      - type: file_contains
        path: "packages/sdk/src/buyer.ts"
        pattern: "verifyMessage"
        label: "Buyer verifies signatures"
      - type: command_passes
        command: "cd packages/protocol && npx tsc --noEmit"
        label: "Protocol compiles"
        timeout: 60
      - type: command_passes
        command: "cd packages/sdk && npx tsc --noEmit"
        label: "SDK compiles"
        timeout: 60
      - type: command_passes
        command: "cd packages/sdk && npx vitest run 2>&1 | tail -10"
        label: "SDK tests pass after crypto fix"
        timeout: 300

