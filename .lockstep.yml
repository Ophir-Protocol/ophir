  # ==========================================================================
  # STEP 9: Solana Escrow — Anchor Program
  # ==========================================================================
  - name: "Solana Escrow — Anchor Program"
    retries: 10
    timeout: 900
    prompt: |
      Build the Solana escrow Anchor program in packages/escrow/.
      Review existing code and fix all issues. This must be production-quality Rust.

      The program has 4 instructions for managing USDC escrow tied to negotiated agreements.

      programs/ophir-escrow/src/lib.rs:

      use anchor_lang::prelude::*;
      use anchor_spl::token::{self, Token, TokenAccount, Transfer, Mint};
      use anchor_spl::associated_token::AssociatedToken;

      EVERY function and struct must have doc comments (///).

      1. EscrowAccount (PDA, seeds: ["escrow", buyer.key(), &agreement_hash]):
         /// Stores escrow state for a negotiated agreement
         pub struct EscrowAccount {
           pub buyer: Pubkey,           // Buyer's wallet
           pub seller: Pubkey,          // Seller's wallet
           pub mint: Pubkey,            // Token mint (USDC)
           pub agreement_hash: [u8; 32], // SHA-256 of canonical agreement terms
           pub deposit_amount: u64,     // Deposited amount in smallest units
           pub penalty_rate_bps: u16,   // Basis points for penalty (e.g. 500 = 5%)
           pub created_at: i64,         // Unix timestamp
           pub timeout_slot: u64,       // Slot number for auto-cancel
           pub status: EscrowStatus,    // Current status
           pub bump: u8,                // PDA bump
         }
         Space: 8 + 32 + 32 + 32 + 32 + 8 + 2 + 8 + 8 + 1 + 1 = 164

         #[derive(AnchorSerialize, AnchorDeserialize, Clone, PartialEq, Eq)]
         pub enum EscrowStatus { Active, Released, Disputed, Cancelled }

      2. make_escrow(ctx, agreement_hash, deposit_amount, timeout_slots, penalty_rate_bps):
         - Create EscrowAccount PDA
         - Create vault token account (PDA seeds: ["vault", escrow.key()])
         - Transfer deposit_amount from buyer's token account to vault
         - Set timeout_slot = Clock::get()?.slot + timeout_slots
         - Validate: deposit_amount > 0
         - Validate: penalty_rate_bps <= 10000 (max 100%)
         - Validate: timeout_slots > 0

      3. release_escrow(ctx, verification_hash: Option<[u8; 32]>):
         - Require escrow.status == Active
         - Transfer entire vault balance to seller's token account
         - Set status = Released
         - Use PDA signer seeds for vault transfer

      4. dispute_escrow(ctx, violation_evidence_hash, penalty_amount):
         - Require escrow.status == Active
         - Require: penalty_amount <= escrow.deposit_amount * penalty_rate_bps / 10000
         - Transfer penalty_amount to buyer's token account
         - Transfer remainder to seller's token account
         - Set status = Disputed
         - Emit DisputeEvent { agreement_hash, penalty_amount, violation_evidence_hash }

      5. cancel_escrow(ctx):
         - Require escrow.status == Active
         - Require Clock::get()?.slot >= escrow.timeout_slot
         - Transfer entire vault balance back to buyer
         - Set status = Cancelled

      Custom errors:
      #[error_code]
      pub enum EscrowError {
         #[msg("Escrow is not active")]
         EscrowNotActive,
         #[msg("Timeout has not been reached")]
         TimeoutNotReached,
         #[msg("Penalty exceeds maximum allowed")]
         PenaltyExceedsMax,
         #[msg("Invalid deposit amount")]
         InvalidDeposit,
         #[msg("Invalid timeout")]
         InvalidTimeout,
         #[msg("Invalid penalty rate")]
         InvalidPenaltyRate,
      }

      Events:
      #[event]
      pub struct EscrowCreated { pub buyer: Pubkey, pub seller: Pubkey, pub agreement_hash: [u8; 32], pub deposit_amount: u64 }
      #[event]
      pub struct EscrowReleased { pub agreement_hash: [u8; 32], pub amount: u64 }
      #[event]
      pub struct EscrowDisputed { pub agreement_hash: [u8; 32], pub penalty_amount: u64, pub evidence_hash: [u8; 32] }
      #[event]
      pub struct EscrowCancelled { pub agreement_hash: [u8; 32], pub refund_amount: u64 }

      Account structs for each instruction:
      - MakeEscrow: buyer (signer, mut), escrow (init, PDA), vault (init, token account PDA),
        buyer_token_account (mut), mint, token_program, system_program, rent
      - ReleaseEscrow: seller (signer), escrow (mut, has_one = seller), vault (mut),
        seller_token_account (mut), token_program
      - DisputeEscrow: buyer (signer), escrow (mut, has_one = buyer), vault (mut),
        buyer_token_account (mut), seller_token_account (mut), token_program
      - CancelEscrow: buyer (signer), escrow (mut, has_one = buyer), vault (mut),
        buyer_token_account (mut), token_program

      Ensure Cargo.toml has correct dependencies:
        anchor-lang = "0.31.1"
        anchor-spl = { version = "0.31.1", features = ["token"] }

      Ensure Anchor.toml exists with program configuration.

      Try: cd packages/escrow && anchor build
      If anchor/rust toolchain isn't available, just ensure the source is correct.
    validate:
      - type: file_exists
        target: "packages/escrow/programs/ophir-escrow/src/lib.rs"
        label: "Escrow program source exists"
      - type: file_contains
        path: "packages/escrow/programs/ophir-escrow/src/lib.rs"
