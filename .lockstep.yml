  # ==========================================================================
  # STEP 20: Fix DX and Architecture — JSDoc and clean exports
  # ==========================================================================
  - name: "Fix DX — JSDoc, Clean Exports, README Examples"
    retries: 7
    timeout: 900
    prompt: |
      Polish developer experience, architecture, and documentation.

      1. JSDoc on ALL public functions in packages/sdk/src/:
         Every exported function and class method must have:
         /** One-line description
          * @param paramName - Description
          * @returns Description
          * @throws {OphirError} When...
          * @example
          * ```typescript
          * const result = await doThing(param);
          * ```
          */
         Files to check: buyer.ts, seller.ts, signing.ts, identity.ts, messages.ts,
         sla.ts, escrow.ts, transport.ts, server.ts, negotiation.ts, discovery.ts,
         lockstep.ts, x402.ts

      2. Clean exports in packages/sdk/src/index.ts:
         - Export EVERY public class: BuyerAgent, SellerAgent, NegotiationSession,
           EscrowManager, JsonRpcClient, NegotiationServer, LockstepMonitor
         - Export EVERY public function: canonicalize, sign, verify, agreementHash,
           signMessage, verifyMessage, generateKeyPair, publicKeyToDid, didToPublicKey,
           generateAgentIdentity, buildRFQ, buildQuote, buildCounter, buildAccept,
           buildReject, buildDispute, compareSLAs, meetsSLARequirements,
           slaToLockstepSpec, discoverAgents, parseAgentCard,
           agreementToLockstepSpec, agreementToX402Headers
         - Export SLA_TEMPLATES
         - Export ALL types from types.ts
         - Re-export ALL types from @ophir/protocol

      3. README.md — Verify the buyer and seller examples are ACTUAL WORKING CODE:
         The 15-line buyer example must use the REAL API:
         - import { BuyerAgent } from '@ophir/sdk'
         - new BuyerAgent({ endpoint: '...' })
         - buyer.requestQuotes({ sellers, service, budget, sla })
         - buyer.waitForQuotes(session)
         - buyer.rankQuotes(quotes, 'cheapest')
         - buyer.acceptQuote(best)

         The 15-line seller example must use the REAL API:
         - import { SellerAgent } from '@ophir/sdk'
         - new SellerAgent({ endpoint: '...', services: [...] })
         - seller.onRFQ(async (rfq) => seller.generateQuote(rfq))
         - seller.listen(3000)

         If the current examples don't match the actual API, fix them.

      4. No 'any' types — grep for ': any' and replace with proper types.
         Exceptions: Record<string, any> is OK for flexible key-value maps.

      5. Consistent error handling — every throw should be:
         throw new OphirError(OphirErrorCode.SPECIFIC_CODE, 'Human message', optionalData)
         Not: throw new Error('...')

      6. Compile and test everything:
         cd packages/protocol && npx tsc --noEmit
         cd packages/sdk && npx tsc --noEmit
         cd packages/reference-agents && npx tsc --noEmit
         cd packages/demo && npx tsc --noEmit
         cd packages/mcp-server && npx tsc --noEmit
         cd packages/sdk && npx vitest run
    validate:
      - type: command_passes
        command: "cd packages/protocol && npx tsc --noEmit"
        label: "Protocol compiles"
        timeout: 60
      - type: command_passes
        command: "cd packages/sdk && npx tsc --noEmit"
        label: "SDK compiles"
        timeout: 60
      - type: command_passes
        command: "cd packages/reference-agents && npx tsc --noEmit"
        label: "Reference agents compile"
        timeout: 60
      - type: command_passes
        command: "cd packages/demo && npx tsc --noEmit"
        label: "Demo compiles"
        timeout: 60
      - type: command_passes
        command: "cd packages/sdk && npx vitest run 2>&1 | tail -10"
        label: "All tests pass"
        timeout: 300
      - type: file_contains
        path: "packages/sdk/src/index.ts"
        pattern: "BuyerAgent"
        label: "BuyerAgent exported"
      - type: file_contains
        path: "packages/sdk/src/index.ts"
        pattern: "SellerAgent"
        label: "SellerAgent exported"
      - type: file_contains
        path: "packages/sdk/src/index.ts"
        pattern: "EscrowManager"
        label: "EscrowManager exported"

  # ==========================================================================
  # STEP 21: Final AI Judge
  # ==========================================================================
  - name: "Final Quality Gate"
    retries: 10
    timeout: 900
    prompt: |
      Final quality pass before the AI judge. Review the ENTIRE codebase one more time.

      Run these checks and fix any remaining issues:

      1. cd packages/protocol && npx tsc --noEmit (must pass)
      2. cd packages/sdk && npx tsc --noEmit (must pass)
      3. cd packages/reference-agents && npx tsc --noEmit (must pass)
      4. cd packages/demo && npx tsc --noEmit (must pass)
      5. cd packages/mcp-server && npx tsc --noEmit (must pass)
      6. cd packages/protocol && npx vitest run (must pass)
      7. cd packages/sdk && npx vitest run (must pass)

      Then verify these SPECIFIC things the AI judge checks:

      PROTOCOL DESIGN:
      - All 6 message types have TypeScript interfaces AND Zod schemas
      - ALL message types have signature fields (RFQ, Quote, Counter, Accept, Reject, Dispute)
      - NegotiationState has all 11 states
      - State machine enforces all transitions

      CRYPTO CORRECTNESS:
      - tweetnacl.sign.detached used for signing
      - json-stable-stringify used for canonicalization
      - SHA-256 for agreement hashes
      - DID:key with 0xed01 multicodec prefix
      - ALL received messages have signatures VERIFIED before trusting
      - Key lengths validated (32 for public, 64 for secret)

      TEST COVERAGE:
      - Count total it() blocks — must be 100+
      - Adversarial crypto tests exist (wrong key, tampered data)
      - State machine tests cover all valid AND invalid transitions
      - HTTP integration tests exist
      - Message builder tests verify signatures

      ESCROW DESIGN:
      - Anchor program has doc comments on everything
      - has_one constraints used
      - Checked arithmetic for penalty calculation
      - All 4 instructions complete with status checks
      - Events emitted

      DOCUMENTATION:
      - README has value proposition, before/after, working code examples
      - JSDoc on all public functions

      Fix anything that's not perfect. This is the final pass.
    validate:
      - type: command_passes
        command: "cd packages/protocol && npx tsc --noEmit"
        label: "Protocol compiles"
        timeout: 60
      - type: command_passes
        command: "cd packages/sdk && npx tsc --noEmit"
        label: "SDK compiles"
        timeout: 60
      - type: command_passes
        command: "cd packages/protocol && npx vitest run 2>&1 | tail -5"
        label: "Protocol tests pass"
        timeout: 120
      - type: command_passes
        command: "cd packages/sdk && npx vitest run 2>&1 | tail -10"
        label: "SDK tests pass"
        timeout: 300
      - type: ai_judge
        criteria: |
          Evaluate the Ophir (Agent Negotiation Protocol) implementation on these
          7 dimensions. Score EACH dimension 1-10.

          1. Protocol Design:
             All 6 message types (RFQ, Quote, Counter, Accept, Reject, Dispute)
             must have TypeScript interfaces with JSDoc AND Zod runtime schemas.
             ALL message types must have signature fields for cryptographic auth.
             The negotiation state machine must have all 11 states with enforced transitions.
             JSON-RPC envelopes must be correct (jsonrpc: "2.0", method, id, params).

          2. Cryptographic Correctness:
             Signing must use tweetnacl Ed25519 sign.detached (NOT sign()).
             JCS canonicalization must use json-stable-stringify for determinism.
             SHA-256 must be used for agreement hashes with hex encoding.
             DID:key must use correct Ed25519 multicodec prefix (0xed, 0x01).
             ALL received messages must have signatures VERIFIED before trusting.
             Key lengths must be validated (32 bytes public, 64 bytes secret).
             Both buyer AND seller must verify each other's signatures.

          3. Developer Experience:
             BuyerAgent must be usable in ~15 lines of code.
             SellerAgent must be usable in ~15 lines of code.
             Good defaults must exist. API must be intuitive.
             JSDoc comments with @param, @returns, @example on public functions.

          4. Architecture:
             Monorepo with clean package boundaries.
             @ophir/protocol has minimal dependencies (Zod only).
             Clear separation between protocol types, SDK, and applications.

          5. Test Coverage:
             100+ test cases across the test suite.
             Adversarial crypto tests (wrong key → fail, tampered data → fail).
             State machine tests for all valid AND invalid transitions.
             HTTP integration tests with real buyer↔seller communication.
             Message builder tests that verify produced signatures.
             Signature verification tests in buyer and seller agents.

          6. Escrow Design:
             Anchor program with doc comments (///) on all items.
             has_one constraints used for account validation.
             Checked arithmetic (u128 intermediate) for penalty calculation.
             All 4 instructions (make, release, dispute, cancel) complete.
             Status checks preventing double-actions.
             Events emitted for all state changes.
             PDA seed patterns documented.

          7. Documentation:
             README with clear value proposition and before/after comparison.
             Working TypeScript code examples (not pseudocode).
             Quickstart guide and protocol specification.
        threshold: 9.0
        evaluation_targets:
          - "packages/protocol/src/"
          - "packages/sdk/src/"
          - "packages/escrow/programs/ophir-escrow/src/"
          - "README.md"
          - "packages/docs/"
        label: "AI judge scores 9+ across all dimensions"
