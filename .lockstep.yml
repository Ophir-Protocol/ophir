      - type: file_contains
        path: "packages/sdk/src/__tests__/buyer.test.ts"
        pattern: "invalid signature"
        is_regex: false
        label: "Buyer has invalid signature test"
      - type: file_contains
        path: "packages/sdk/src/__tests__/messages.test.ts"
        pattern: "buildRFQ.*sign"
